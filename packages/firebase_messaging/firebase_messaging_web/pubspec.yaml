name: firebase_messaging_web
description: The web implementation of firebase_messaging
homepage: https://github.com/firebase/flutterfire/tree/main/packages/firebase_messaging/firebase_messaging_web
repository: https://github.com/firebase/flutterfire/tree/main/packages/firebase_messaging/firebase_messaging_web
version: 4.2.0
publish_to: none

environment:
  sdk: '^3.12.0'
  flutter: '>=3.44.0'

dependencies:
  firebase_core: 
    git: "https://github.com/kumsumit/firebase_core.git"
  firebase_core_web: 
    git: "https://github.com/kumsumit/firebase_core_web.git"
  firebase_messaging_platform_interface: 
    git: "https://github.com/kumsumit/firebase_messaging_platform_interface.git"
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter    
  flutterfire_internals:
    git: "https://github.com/kumsumit/flutterfire_internals.git"  
  meta: ^1.8.3
  web: ^1.1.1

dev_dependencies:
  firebase_core_platform_interface: 
    git: "https://github.com/kumsumit/firebase_core_platform_interface.git"
  flutter_test:
    sdk: flutter
  mockito: ^5.7.0

flutter:
  plugin:
    platforms:
      web:
        pluginClass: FirebaseMessagingWeb
        fileName: firebase_messaging_web.dart
