name: firebase_analytics_web
description: The web implementation of firebase_analytics
homepage: https://github.com/firebase/flutterfire/tree/main/packages/firebase_analytics/firebase_analytics_web
repository: https://github.com/firebase/flutterfire/tree/main/packages/firebase_analytics/firebase_analytics_web
version: 0.6.1+8
publish_to: none

environment:
  sdk: '^3.12.0'
  flutter: '>=3.44.0'

dependencies:
  _flutterfire_internals:
    git: https://github.com/kumsumit/_flutterfire_internals.git
  firebase_analytics_platform_interface:
    git: https://github.com/kumsumit/firebase_analytics_platform_interface.git
  firebase_core:
    git: https://github.com/kumsumit/firebase_core.git
  firebase_core_web:
    git: https://github.com/kumsumit/firebase_core_web.git
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

dev_dependencies:
  build_runner: ^2.15.0
  flutter_test:
    sdk: flutter
  mockito: ^5.7.0

flutter:
  plugin:
    platforms:
      web:
        pluginClass: FirebaseAnalyticsWeb
        fileName: firebase_analytics_web.dart
